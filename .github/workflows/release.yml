name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version in pyproject.toml
        run: |
          python -c "
          import re
          with open('pyproject.toml', 'r') as f:
              content = f.read()
          match = re.search(r'version\s*=\s*\"(.+?)\"', content)
          version = match.group(1)
          major, minor, patch = map(int, version.split('.'))
          bump = '${{ github.event.inputs.version_bump }}'
          if bump == 'major':
              major += 1
              minor = 0
              patch = 0
          elif bump == 'minor':
              minor += 1
              patch = 0
          else:
              patch += 1
          new_version = f'{major}.{minor}.{patch}'
          new_content = re.sub(r'version\s*=\s*\".+?\"', f'version = \"{new_version}\"', content)
          with open('pyproject.toml', 'w') as f:
              f.write(new_content)
          print(f'Version bumped to {new_version}')
          "

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "chore: bump version [skip ci]"
          git push

      - name: Get new version
        id: get_version
        run: |
          VERSION=$(python -c "
          import re
          with open('pyproject.toml') as f:
              match = re.search(r'version\s*=\s*\"(.+?)\"', f.read())
              print(match.group(1))
          ")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build:
    needs: [bump-version]
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: Kommit-Windows.exe
            pyinstaller_args: >-
              --name Kommit
              --windowed
              --onefile
              --icon "ui/assets/favicon.ico"
              --add-data "ui/assets;ui/assets"
              main.py
            output_path: dist/Kommit.exe

          - os: ubuntu-latest
            artifact: Kommit-Linux
            pyinstaller_args: >-
              --name Kommit
              --windowed
              --onefile
              --add-data "ui/assets:ui/assets"
              main.py
            output_path: dist/Kommit

          - os: macos-latest
            artifact: Kommit-macOS
            needs_icns: true
            pyinstaller_args: >-
              --name Kommit
              --windowed
              --onefile
              --icon "ui/assets/icon.icns"
              --add-data "ui/assets:ui/assets"
              main.py
            output_path: dist/Kommit

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux display dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libxkbcommon0 \
            libdbus-1-3 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-keysyms1 \
            libxcb-shape0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Generate macOS icon
        if: matrix.needs_icns
        run: |
          mkdir -p icon.iconset
          sips -z 16 16     ui/assets/icon-512.png --out icon.iconset/icon_16x16.png
          sips -z 32 32     ui/assets/icon-512.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32 32     ui/assets/icon-512.png --out icon.iconset/icon_32x32.png
          sips -z 64 64     ui/assets/icon-512.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128 128   ui/assets/icon-512.png --out icon.iconset/icon_128x128.png
          sips -z 256 256   ui/assets/icon-512.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256 256   ui/assets/icon-512.png --out icon.iconset/icon_256x256.png
          sips -z 512 512   ui/assets/icon-512.png --out icon.iconset/icon_256x256@2x.png
          cp ui/assets/icon-512.png icon.iconset/icon_512x512.png
          iconutil -c icns icon.iconset -o ui/assets/icon.icns

      - name: Build executable
        run: pyinstaller ${{ matrix.pyinstaller_args }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.output_path }}

  release:
    needs: [build, bump-version]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION="${{ needs.bump-version.outputs.version }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/Kommit-Windows.exe/Kommit.exe release/Kommit-Windows.exe
          cp artifacts/Kommit-Linux/Kommit release/Kommit-Linux
          cp artifacts/Kommit-macOS/Kommit release/Kommit-macOS
          chmod +x release/Kommit-Linux release/Kommit-macOS

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Kommit v${{ steps.version.outputs.version }}
          body: |
            ## Kommit v${{ steps.version.outputs.version }}

            ### Downloads
            - **Windows**: `Kommit-Windows.exe`
            - **Linux**: `Kommit-Linux` (run `chmod +x Kommit-Linux` after downloading)
            - **macOS**: `Kommit-macOS` (run `chmod +x Kommit-macOS` after downloading)

            ### Requirements
            - Git must be installed and available on your PATH
          files: |
            release/Kommit-Windows.exe
            release/Kommit-Linux
            release/Kommit-macOS
          make_latest: true
